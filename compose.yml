services:
  database:
    image: mysql:8.4
    container_name: sekirei-todo-database
    env_file:
      - .env.database
    environment:
      TZ: 'Asia/Tokyo'
      LANG: 'ja_JP.UTF-8'
      DB_HOST: database
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    cap_add:
      - SYS_NICE
    healthcheck:
      test: mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e "select 1;"
      interval: 5s
      timeout: 20s
      retries: 3
      start_period: 5s

  server-ts:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sekirei-todo-server-ts
    working_dir: /workspace/server-ts
    env_file:
      - .env.database
      - .env.server-ts
    environment:
      DB_HOST: database
    command: pnpm dev
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./server-ts
          target: /workspace/server-ts
          ignore:
            - node_modules/
            - dist/
            - "*.tsbuildinfo"
        - action: sync+restart
          path: ./database
          target: /workspace/database
          ignore:
            - node_modules/
            - "*.tsbuildinfo"
        - action: rebuild
          path: pnpm-lock.yaml

volumes:
  mysql-data:

networks:
  default:
    name: sekirei-todo-network
